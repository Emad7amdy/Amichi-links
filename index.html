    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            color: #434934; /* Deep olive for premium contrast on light background */
        }
        .serif-font {
            font-family: 'Cinzel', serif;
        }
        
        /* Premium Soft Beige Gradient with elegant fabric texture overlay */
        .beige-gradient-bg {
            background: linear-gradient(180deg, #f9f6f0 0%, #ebdcb9 50%, #d4c3a3 100%);
            background-attachment: fixed;
        }

        /* Subtle noise texture to represent natural plaster/fabric */
        .texture-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3e%3cfilter id='noiseFilter'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3e%3c/filter%3e%3crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3e%3c/svg%3e");
            pointer-events: none;
            z-index: 1;
        }

        /* Fully rounded capsule buttons in deep olive to pop out elegantly on the beige gradient */
        .capsule-btn {
            background-color: #555d42;
            color: #fcfbf9;
            border: 1px solid rgba(85, 93, 66, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .capsule-btn:hover {
            background-color: #fcfbf9;
            color: #555d42;
            border-color: #555d42;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(85, 93, 66, 0.15);
        }
    </style>
</head>
